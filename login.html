<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login · Al-Falah Islamic Academy</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--g:#1a4030;--gm:#1a6b3a;--gold:#c9a84c}
body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#0d2818,#1a4030 50%,#0d2818);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#fff;border-radius:24px;width:100%;max-width:440px;padding:40px;box-shadow:0 24px 80px rgba(0,0,0,.4)}
.logo{text-align:center;margin-bottom:28px}
.logo-circle{width:64px;height:64px;background:linear-gradient(135deg,#1a4030,#1a6b3a);border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:30px;margin-bottom:10px}
.logo h1{font-size:19px;font-weight:800;color:#1a4030}.logo p{font-size:12px;color:#888;margin-top:3px}
.tabs{display:flex;background:#f5f5f0;border-radius:12px;padding:4px;margin-bottom:26px}
.tab{flex:1;padding:10px;text-align:center;font-size:14px;font-weight:600;color:#888;border-radius:9px;cursor:pointer;border:none;background:none;transition:all .2s;font-family:inherit}
.tab.active{background:#fff;color:#1a4030;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.form{display:none}.form.active{display:block}
label{display:block;font-size:13px;font-weight:600;color:#444;margin:14px 0 5px}
input,select{width:100%;padding:11px 14px;border:1.5px solid #e0e0e0;border-radius:10px;font-size:14px;font-family:inherit;outline:none;background:#fafaf8;transition:border .2s}
input:focus,select:focus{border-color:#1a6b3a;background:#fff}
.role-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:5px}
.role-btn{padding:14px;border:2px solid #e0e0e0;border-radius:12px;text-align:center;cursor:pointer;transition:all .2s;background:#fafaf8}
.role-btn .ri{font-size:24px;display:block;margin-bottom:6px}
.role-btn .rl{font-size:13px;font-weight:600;color:#666}
.role-btn.sel{border-color:#1a6b3a;background:#f0f7f2}.role-btn.sel .rl{color:#1a4030}
.tc-wrap{display:none}.tc-wrap.show{display:block}
.btn{width:100%;padding:13px;background:linear-gradient(135deg,#1a4030,#1a6b3a);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;margin-top:20px;font-family:inherit;transition:opacity .2s}
.btn:hover{opacity:.9}.btn:disabled{opacity:.6;cursor:not-allowed}
.forgot{text-align:right;margin-top:8px}.forgot a{font-size:12px;color:#1a6b3a;font-weight:600;cursor:pointer}
.msg{border-radius:10px;padding:10px 14px;font-size:13px;margin-top:12px;display:none}
.msg.show{display:block}
.msg.err{background:#fef2f2;border:1px solid #fecaca;color:#dc2626}
.msg.ok{background:#f0f9f4;border:1px solid #bbf7d0;color:#15803d}
.msg.info{background:#eff6ff;border:1px solid #bfdbfe;color:#1d4ed8}
.back{text-align:center;margin-top:22px}.back a{font-size:13px;color:#1a6b3a;font-weight:600}
.spin{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-circle">🕌</div>
    <h1>Al-Falah Islamic Academy</h1>
    <p>Student &amp; Teacher Portal</p>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('in')">Sign In</button>
    <button class="tab" onclick="switchTab('up')">Create Account</button>
  </div>

  <!-- SIGN IN -->
  <div class="form active" id="fIn">
    <label>Email Address</label>
    <input type="email" id="siE" placeholder="your@email.com">
    <label>Password</label>
    <input type="password" id="siP" placeholder="••••••••">
    <div class="forgot"><a onclick="forgotPw()">Forgot password?</a></div>
    <div class="msg" id="siMsg"></div>
    <button class="btn" onclick="doSignIn(this)">Sign In →</button>
  </div>

  <!-- SIGN UP -->
  <div class="form" id="fUp">
    <label>Full Name</label>
    <input type="text" id="suN" placeholder="Muhammad Abdullah">
    <label>Email Address</label>
    <input type="email" id="suE" placeholder="your@email.com">
    <label>Password</label>
    <input type="password" id="suP" placeholder="Minimum 6 characters">
    <label>I am a</label>
    <div class="role-grid">
      <div class="role-btn sel" id="rS" onclick="selRole('student')">
        <span class="ri">📚</span><span class="rl">Student</span>
      </div>
      <div class="role-btn" id="rT" onclick="selRole('teacher')">
        <span class="ri">👨‍🏫</span><span class="rl">Teacher</span>
      </div>
    </div>
    <div class="tc-wrap" id="tcWrap">
      <label>Teacher Access Code</label>
      <input type="password" id="tc" placeholder="Enter code provided by Dr. Naeem">
    </div>
    <div class="msg" id="suMsg"></div>
    <button class="btn" onclick="doSignUp(this)">Create Account →</button>
  </div>

  <div class="back"><a href="index.html">← Back to Academy</a></div>
</div>

<script src="supabase-config.js"></script>
<script>
let role = 'student';
const TC = 'ALFALAH-TEACHER-2024';

function switchTab(t) {
  document.querySelectorAll('.tab').forEach((el,i) => el.classList.toggle('active',(i===0)===(t==='in')));
  document.getElementById('fIn').classList.toggle('active', t==='in');
  document.getElementById('fUp').classList.toggle('active', t==='up');
}
function selRole(r) {
  role = r;
  document.getElementById('rS').classList.toggle('sel', r==='student');
  document.getElementById('rT').classList.toggle('sel', r==='teacher');
  document.getElementById('tcWrap').classList.toggle('show', r==='teacher');
}
function showMsg(id, msg, type='err') {
  const el = document.getElementById(id);
  el.textContent = msg; el.className = `msg ${type} show`;
  if (type==='err') setTimeout(() => el.classList.remove('show'), 6000);
}
function setBtn(btn, loading, text) {
  btn.disabled = loading;
  btn.innerHTML = loading ? `<span class="spin"></span>${text}` : text;
}

async function doSignIn(btn) {
  const email = document.getElementById('siE').value.trim();
  const password = document.getElementById('siP').value;
  if (!email || !password) return showMsg('siMsg','Please fill in all fields.');
  setBtn(btn, true, 'Signing in…');
  try {
    const { data, error } = await _sb.auth.signInWithPassword({ email, password });
    if (error) throw error;
    const { data: profile } = await _sb.from('profiles').select('role').eq('id', data.user.id).single();
    window.location.href = (profile?.role === 'teacher') ? 'teacher-dashboard.html' : 'student-dashboard.html';
  } catch(e) {
    setBtn(btn, false, 'Sign In →');
    showMsg('siMsg', e.message.includes('Invalid login') ? 'Invalid email or password.' : e.message);
  }
}

async function doSignUp(btn) {
  const name = document.getElementById('suN').value.trim();
  const email = document.getElementById('suE').value.trim();
  const password = document.getElementById('suP').value;
  if (!name||!email||!password) return showMsg('suMsg','Please fill in all fields.');
  if (password.length < 6) return showMsg('suMsg','Password must be at least 6 characters.');
  if (role==='teacher' && document.getElementById('tc').value !== TC)
    return showMsg('suMsg','Invalid teacher access code. Contact Dr. Muhammad Naeem.');
  setBtn(btn, true, 'Creating account…');
  try {
    const { data, error } = await _sb.auth.signUp({ email, password });
    if (error) throw error;
    const uid = data.user.id;
    await _sb.from('profiles').insert({ id: uid, name, role, phone: '', course: 'Quran Hifz', monthly_fee: 2000, payment_status: 'pending' });
    if (role === 'student') {
      await _sb.from('progress').insert({ id: uid, surahs: [], notes: '' });
    }
    // Check if email confirmation needed
    if (data.session) {
      window.location.href = role==='teacher' ? 'teacher-dashboard.html' : 'student-dashboard.html';
    } else {
      showMsg('suMsg', '✓ Account created! Check your email to confirm, then sign in.', 'ok');
      setBtn(btn, false, 'Create Account →');
    }
  } catch(e) {
    setBtn(btn, false, 'Create Account →');
    showMsg('suMsg', e.message.includes('already registered') ? 'Email already registered. Try signing in.' : e.message);
  }
}

async function forgotPw() {
  const email = document.getElementById('siE').value.trim();
  if (!email) return showMsg('siMsg','Enter your email above first.');
  const { error } = await _sb.auth.resetPasswordForEmail(email, { redirectTo: window.location.origin + '/login.html' });
  if (error) showMsg('siMsg', error.message);
  else showMsg('siMsg','Password reset email sent! Check your inbox.','ok');
}

// Auto-redirect if already logged in
(async () => {
  const { data: { session } } = await _sb.auth.getSession();
  if (!session) return;
  const { data: p } = await _sb.from('profiles').select('role').eq('id', session.user.id).single();
  if (p) window.location.href = p.role==='teacher' ? 'teacher-dashboard.html' : 'student-dashboard.html';
})();
</script>
</body>
</html>
