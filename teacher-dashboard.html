<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teacher Dashboard · Al-Falah Islamic Academy</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--g:#1a4030;--gm:#1a6b3a;--gold:#c9a84c;--gold-lt:#fdf6e3;--bg:#f5f7f4;--card:#fff;--text:#1a1a1a;--muted:#666}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

.nav{background:linear-gradient(135deg,#0d2818,#1a4030);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:60px;position:sticky;top:0;z-index:100}
.nav-logo{display:flex;align-items:center;gap:10px}
.nav-logo span{font-size:22px}
.nav-title{font-size:15px;font-weight:700;color:#fff}
.nav-title small{display:block;font-size:11px;font-weight:400;color:rgba(255,255,255,.6)}
.nav-right{display:flex;align-items:center;gap:12px}
.nav-name{font-size:13px;font-weight:600;color:rgba(255,255,255,.85)}
.nav-logout{font-size:12px;font-weight:600;background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.2);padding:6px 14px;border-radius:8px;cursor:pointer;font-family:inherit;transition:background .2s}
.nav-logout:hover{background:rgba(255,255,255,.22)}

.main{max-width:1200px;margin:0 auto;padding:28px 20px}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:28px}
.stat{background:var(--card);border-radius:16px;padding:20px 24px;border:1px solid #e8e8e0;display:flex;align-items:center;gap:16px}
.stat-icon{font-size:32px}
.stat-val{font-size:24px;font-weight:800;color:var(--g)}
.stat-label{font-size:12px;color:var(--muted);margin-top:1px}

/* TWO-COL LAYOUT */
.two-col{display:grid;grid-template-columns:320px 1fr;gap:20px;margin-bottom:24px}
@media(max-width:900px){.two-col{grid-template-columns:1fr}}

.card{background:var(--card);border-radius:18px;padding:24px;border:1px solid #e8e8e0}
.card-title{font-size:14px;font-weight:700;color:var(--g);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.card-title span{font-size:18px}

/* SEARCH */
.search-input{width:100%;padding:10px 14px;border:1.5px solid #e0e0e0;border-radius:10px;font-size:13px;font-family:inherit;outline:none;background:#fafaf8;margin-bottom:12px}
.search-input:focus{border-color:#1a6b3a}

/* STUDENT LIST */
.student-item{padding:12px;border-radius:12px;cursor:pointer;transition:background .15s;margin-bottom:4px;display:flex;align-items:center;gap:12px}
.student-item:hover{background:#f5f7f4}
.student-item.active{background:#f0f7f2;border:1.5px solid #1a6b3a}
.student-avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#1a4030,#1a6b3a);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:15px;flex-shrink:0}
.student-info{flex:1;min-width:0}
.student-name{font-size:13px;font-weight:600;color:var(--text)}
.student-meta{font-size:11px;color:var(--muted)}
.s-badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;margin-left:6px}
.s-badge-g{background:#f0f9f4;color:#15803d;border:1px solid #bbf7d0}
.s-badge-r{background:#fef2f2;color:#dc2626;border:1px solid #fecaca}
.s-badge-y{background:#fffbeb;color:#d97706;border:1px solid #fde68a}
.no-students{text-align:center;padding:30px;color:var(--muted);font-size:13px}

/* DETAIL PANEL */
.detail-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:300px;color:var(--muted);gap:12px}
.detail-empty span{font-size:48px}

/* DETAIL HEADER */
.detail-header{display:flex;align-items:center;gap:16px;margin-bottom:20px;padding-bottom:20px;border-bottom:1px solid #f0f0ea}
.detail-avatar{width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#1a4030,#1a6b3a);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:20px;flex-shrink:0}
.detail-name{font-size:18px;font-weight:800;color:var(--g)}
.detail-email{font-size:13px;color:var(--muted)}
.detail-course{font-size:12px;color:var(--g);font-weight:600;margin-top:4px}

/* TABS inside detail */
.dtabs{display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap}
.dtab{padding:8px 16px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;border:1.5px solid #e0e0e0;background:#fafaf8;color:#666;font-family:inherit;transition:all .2s}
.dtab.active{background:var(--g);color:#fff;border-color:var(--g)}

/* HIFZ in teacher */
.hifz-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(38px,1fr));gap:4px;margin-top:12px}
.h-cell{aspect-ratio:1;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;cursor:pointer;transition:all .15s;background:#f0f0ea;color:#999;border:1px solid #e0e0d8;user-select:none}
.h-cell.done{background:linear-gradient(135deg,#1a6b3a,#2d9e55);color:#fff;border-color:#1a6b3a}
.h-cell:hover{transform:scale(1.15)}
.hifz-actions{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap}

/* ATTENDANCE FORM */
.att-form{display:flex;flex-direction:column;gap:12px}
.att-form input,.att-form select,.att-form textarea{padding:10px 14px;border:1.5px solid #e0e0e0;border-radius:10px;font-size:13px;font-family:inherit;outline:none;background:#fafaf8}
.att-form input:focus,.att-form select:focus,.att-form textarea:focus{border-color:#1a6b3a}
.att-form label{font-size:12px;font-weight:600;color:#444}
.att-history{margin-top:16px}
.att-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f5f5f0;font-size:13px}
.att-row:last-child{border-bottom:none}
.att-present{color:#15803d;font-weight:600}
.att-absent{color:#dc2626;font-weight:600}

/* PAYMENT FORM */
.pay-form{display:flex;flex-direction:column;gap:12px}
.pay-form input,.pay-form select{padding:10px 14px;border:1.5px solid #e0e0e0;border-radius:10px;font-size:13px;font-family:inherit;outline:none;background:#fafaf8}
.pay-form input:focus,.pay-form select:focus{border-color:#1a6b3a}
.pay-form label{font-size:12px;font-weight:600;color:#444}

/* NOTES */
.notes-area{width:100%;padding:12px 14px;border:1.5px solid #e0e0e0;border-radius:10px;font-size:13px;font-family:inherit;outline:none;background:#fafaf8;resize:vertical;min-height:100px}
.notes-area:focus{border-color:#1a6b3a}

/* BUTTONS */
.btn-primary{padding:10px 20px;background:linear-gradient(135deg,#1a4030,#1a6b3a);color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:opacity .2s}
.btn-primary:hover{opacity:.9}
.btn-outline{padding:10px 20px;background:#fff;color:var(--g);border:1.5px solid var(--g);border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s}
.btn-outline:hover{background:var(--g);color:#fff}
.btn-gold{padding:10px 20px;background:var(--gold);color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:opacity .2s}
.btn-gold:hover{opacity:.9}
.btn-sm{padding:7px 14px;font-size:12px}

/* ANNOUNCEMENTS */
.ann-form{display:flex;flex-direction:column;gap:12px;margin-bottom:20px}
.ann-form input,.ann-form textarea{padding:10px 14px;border:1.5px solid #e0e0e0;border-radius:10px;font-size:13px;font-family:inherit;outline:none;background:#fafaf8;resize:vertical}
.ann-form input:focus,.ann-form textarea:focus{border-color:#1a6b3a}
.ann-item{padding:14px;background:#fafaf8;border-radius:12px;margin-bottom:10px;border:1px solid #e8e8e0}
.ann-title-t{font-size:14px;font-weight:700;margin-bottom:4px}
.ann-body-t{font-size:13px;color:var(--muted);line-height:1.5}
.ann-meta{font-size:11px;color:#bbb;margin-top:6px;display:flex;justify-content:space-between;align-items:center}
.ann-del{font-size:11px;color:#dc2626;cursor:pointer;font-weight:600}

/* TOAST */
.toast{position:fixed;bottom:28px;right:28px;background:#1a4030;color:#fff;padding:12px 20px;border-radius:12px;font-size:13px;font-weight:600;box-shadow:0 8px 24px rgba(0,0,0,.2);z-index:999;opacity:0;transform:translateY(10px);transition:all .3s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}

/* LOADING */
.loading-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg);flex-direction:column;gap:16px}
.spin{width:40px;height:40px;border:3px solid #e0e0e0;border-top-color:#1a6b3a;border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.spin-sm{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite;vertical-align:middle;margin-right:6px}
</style>
</head>
<body>

<div class="loading-screen" id="loadingScreen">
  <div class="spin"></div>
  <p style="color:#666;font-size:14px">Loading teacher dashboard…</p>
</div>

<div id="appShell" style="display:none">

<nav class="nav">
  <div class="nav-logo">
    <span>🕌</span>
    <div class="nav-title">Al-Falah Academy<small>Teacher Dashboard</small></div>
  </div>
  <div class="nav-right">
    <span class="nav-name" id="navName"></span>
    <button class="nav-logout" onclick="logout()">Logout</button>
  </div>
</nav>

<div class="main">

  <!-- STATS -->
  <div class="stats">
    <div class="stat"><div class="stat-icon">👥</div><div><div class="stat-val" id="stTotal">0</div><div class="stat-label">Total Students</div></div></div>
    <div class="stat"><div class="stat-icon">📅</div><div><div class="stat-val" id="stToday">—</div><div class="stat-label">Today's Date</div></div></div>
    <div class="stat"><div class="stat-icon">📢</div><div><div class="stat-val" id="stAnn">0</div><div class="stat-label">Announcements</div></div></div>
    <div class="stat"><div class="stat-icon">📖</div><div><div class="stat-val" id="stAvgHifz">0</div><div class="stat-label">Avg Surahs / Student</div></div></div>
  </div>

  <!-- STUDENTS + DETAIL -->
  <div class="two-col">

    <!-- LEFT: Student List -->
    <div class="card">
      <div class="card-title"><span>👥</span> Students</div>
      <input class="search-input" type="text" placeholder="Search student…" oninput="filterStudents(this.value)" id="searchInput">
      <div id="studentList"><div class="no-students">No students yet</div></div>
    </div>

    <!-- RIGHT: Student Detail -->
    <div class="card" id="detailPanel">
      <div class="detail-empty">
        <span>👈</span>
        <p>Select a student to manage</p>
      </div>
    </div>

  </div>

  <!-- ANNOUNCEMENTS -->
  <div class="card">
    <div class="card-title"><span>📢</span> Announcements — All Students See These</div>
    <div class="ann-form">
      <input type="text" id="annTitle" placeholder="Announcement title (e.g. Eid Holiday Notice)">
      <textarea id="annBody" rows="3" placeholder="Write your announcement here…"></textarea>
      <div><button class="btn-primary" onclick="postAnn(this)">Post Announcement</button></div>
    </div>
    <div id="annList"></div>
  </div>

</div>
</div>

<div class="toast" id="toast"></div>

<script src="firebase-config.js"></script>
<script>
const SURAHS = [
  'Al-Fatihah','Al-Baqarah','Aal-Imran','An-Nisa','Al-Maidah','Al-Anam','Al-Araf','Al-Anfal','At-Tawbah','Yunus',
  'Hud','Yusuf','Ar-Ra\'d','Ibrahim','Al-Hijr','An-Nahl','Al-Isra','Al-Kahf','Maryam','Ta-Ha',
  'Al-Anbiya','Al-Hajj','Al-Muminun','An-Nur','Al-Furqan','Ash-Shu\'ara','An-Naml','Al-Qasas','Al-Ankabut','Ar-Rum',
  'Luqman','As-Sajdah','Al-Ahzab','Saba','Fatir','Ya-Sin','As-Saffat','Sad','Az-Zumar','Ghafir',
  'Fussilat','Ash-Shura','Az-Zukhruf','Ad-Dukhan','Al-Jathiyah','Al-Ahqaf','Muhammad','Al-Fath','Al-Hujurat','Qaf',
  'Adh-Dhariyat','At-Tur','An-Najm','Al-Qamar','Ar-Rahman','Al-Waqi\'ah','Al-Hadid','Al-Mujadila','Al-Hashr','Al-Mumtahanah',
  'As-Saf','Al-Jumu\'ah','Al-Munafiqun','At-Taghabun','At-Talaq','At-Tahrim','Al-Mulk','Al-Qalam','Al-Haqqah','Al-Ma\'arij',
  'Nuh','Al-Jinn','Al-Muzzammil','Al-Muddaththir','Al-Qiyamah','Al-Insan','Al-Mursalat','An-Naba','An-Nazi\'at','Abasa',
  'At-Takwir','Al-Infitar','Al-Mutaffifin','Al-Inshiqaq','Al-Buruj','At-Tariq','Al-Ala','Al-Ghashiyah','Al-Fajr','Al-Balad',
  'Ash-Shams','Al-Layl','Ad-Duha','Ash-Sharh','At-Tin','Al-Alaq','Al-Qadr','Al-Bayyinah','Az-Zalzalah','Al-Adiyat',
  'Al-Qari\'ah','At-Takathur','Al-Asr','Al-Humazah','Al-Fil','Quraysh','Al-Ma\'un','Al-Kawthar','Al-Kafirun','An-Nasr',
  'Al-Masad','Al-Ikhlas','Al-Falaq','An-Nas'
];

let allStudents = [], selectedUid = null, currentTab = 'hifz';
let teacherName = 'Dr. Muhammad Naeem';

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
function fmtDate(ts) {
  if (!ts) return '—';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleDateString('en-PK',{day:'numeric',month:'short',year:'numeric'});
}

/* ── STUDENT LIST ── */
function renderStudentList(list) {
  const el = document.getElementById('studentList');
  if (!list.length) { el.innerHTML = '<div class="no-students">No students enrolled yet</div>'; return; }
  el.innerHTML = list.map(s => {
    const initials = s.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
    const ps = s.paymentStatus || 'pending';
    const badge = ps==='paid'?'s-badge-g':ps==='overdue'?'s-badge-r':'s-badge-y';
    const label = ps==='paid'?'Paid':ps==='overdue'?'Overdue':'Due';
    return `<div class="student-item ${selectedUid===s.uid?'active':''}" onclick="selectStudent('${s.uid}')">
      <div class="student-avatar">${initials}</div>
      <div class="student-info">
        <div class="student-name">${s.name}<span class="s-badge ${badge}">${label}</span></div>
        <div class="student-meta">${s.course||'Quran Hifz'} · ${s.email}</div>
      </div>
    </div>`;
  }).join('');
}
function filterStudents(q) {
  const filtered = q ? allStudents.filter(s => s.name.toLowerCase().includes(q.toLowerCase()) || s.email.toLowerCase().includes(q.toLowerCase())) : allStudents;
  renderStudentList(filtered);
}

/* ── SELECT STUDENT ── */
async function selectStudent(uid) {
  selectedUid = uid;
  renderStudentList(allStudents);
  document.getElementById('detailPanel').innerHTML = '<div style="display:flex;align-items:center;justify-content:center;min-height:200px"><div class="spin"></div></div>';

  const [userDoc, progDoc, attSnap] = await Promise.all([
    db.collection('users').doc(uid).get(),
    db.collection('progress').doc(uid).get(),
    db.collection('attendance').doc(uid).collection('records').orderBy('date','desc').limit(10).get()
  ]);

  const u = userDoc.data();
  const prog = progDoc.exists ? progDoc.data() : { surahs: [], notes: '' };
  const attRecords = attSnap.docs.map(d => ({ id: d.id, ...d.data() }));
  const initials = u.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();

  document.getElementById('detailPanel').innerHTML = `
    <div class="detail-header">
      <div class="detail-avatar">${initials}</div>
      <div>
        <div class="detail-name">${u.name}</div>
        <div class="detail-email">${u.email} ${u.phone ? '· '+u.phone : ''}</div>
        <div class="detail-course">${u.course||'Quran Hifz'} · Enrolled ${fmtDate(u.createdAt)}</div>
      </div>
    </div>
    <div class="dtabs">
      <button class="dtab active" onclick="switchDTab('hifz',this)">📗 Quran Hifz</button>
      <button class="dtab" onclick="switchDTab('att',this)">📋 Attendance</button>
      <button class="dtab" onclick="switchDTab('notes',this)">📝 Notes</button>
      <button class="dtab" onclick="switchDTab('payment',this)">💳 Payment</button>
    </div>
    <div id="dtContent"></div>`;

  currentTab = 'hifz';
  renderHifzTab(uid, prog);
}

function switchDTab(tab, btn) {
  currentTab = tab;
  document.querySelectorAll('.dtab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (tab==='hifz') {
    db.collection('progress').doc(selectedUid).get().then(d => renderHifzTab(selectedUid, d.exists?d.data():{surahs:[],notes:''}));
  } else if (tab==='att') {
    db.collection('attendance').doc(selectedUid).collection('records').orderBy('date','desc').limit(20).get()
      .then(s => renderAttTab(selectedUid, s.docs.map(d=>({id:d.id,...d.data()}))));
  } else if (tab==='notes') {
    db.collection('progress').doc(selectedUid).get().then(d => renderNotesTab(selectedUid, d.exists?d.data().notes:''));
  } else if (tab==='payment') {
    db.collection('users').doc(selectedUid).get().then(d => renderPaymentTab(selectedUid, d.data()));
  }
}

/* ── HIFZ TAB ── */
function renderHifzTab(uid, prog) {
  const memorized = new Set(prog.surahs || []);
  const cells = SURAHS.map((name,i) => {
    const num = i+1;
    const done = memorized.has(num);
    return `<div class="h-cell ${done?'done':''}" id="hc${num}" title="${num}. ${name}" onclick="toggleSurah(${num},'${uid}')">${num}</div>`;
  }).join('');
  document.getElementById('dtContent').innerHTML = `
    <p style="font-size:13px;color:#666;margin-bottom:8px">Click a surah to mark/unmark as memorized. <strong style="color:#1a4030">${memorized.size}/114 memorized</strong></p>
    <div class="hifz-grid">${cells}</div>
    <div class="hifz-actions" style="margin-top:16px">
      <button class="btn-primary btn-sm" onclick="saveHifz('${uid}')">💾 Save Progress</button>
      <button class="btn-outline btn-sm" onclick="markAll('${uid}')">✓ Mark All</button>
      <button class="btn-outline btn-sm" onclick="clearAll('${uid}')">✕ Clear All</button>
    </div>`;
}

let pendingHifz = null;
function toggleSurah(num, uid) {
  const cell = document.getElementById('hc'+num);
  cell.classList.toggle('done');
}
async function saveHifz(uid) {
  const memorized = [];
  SURAHS.forEach((_,i) => { if (document.getElementById('hc'+(i+1))?.classList.contains('done')) memorized.push(i+1); });
  await db.collection('progress').doc(uid).set({ surahs: memorized, lastUpdated: firebase.firestore.FieldValue.serverTimestamp() }, { merge: true });
  // update stat display
  const s = allStudents.find(x=>x.uid===uid);
  if (s) s.surahs = memorized;
  const total = allStudents.reduce((a,s)=>a+(s.surahs?.length||0),0);
  document.getElementById('stAvgHifz').textContent = allStudents.length ? Math.round(total/allStudents.length) : 0;
  toast(`✓ Hifz progress saved — ${memorized.length} surahs`);
}
function markAll(uid) { SURAHS.forEach((_,i) => document.getElementById('hc'+(i+1))?.classList.add('done')); }
function clearAll(uid) { SURAHS.forEach((_,i) => document.getElementById('hc'+(i+1))?.classList.remove('done')); }

/* ── ATTENDANCE TAB ── */
function renderAttTab(uid, records) {
  const rows = records.length ? records.map(r => `
    <div class="att-row">
      <span style="color:#666;font-size:13px">${fmtDate(r.date)}</span>
      <span style="font-size:12px;color:#555">${r.lesson||'Class'}</span>
      <span class="${r.present?'att-present':'att-absent'}">${r.present?'✓ Present':'✗ Absent'}</span>
    </div>`).join('') : '<p style="text-align:center;color:#999;padding:16px;font-size:13px">No records yet</p>';

  document.getElementById('dtContent').innerHTML = `
    <div class="att-form">
      <label>Date</label>
      <input type="date" id="attDate" value="${new Date().toISOString().split('T')[0]}">
      <label>Lesson / Topic</label>
      <input type="text" id="attLesson" placeholder="e.g. Surah Al-Baqarah revision">
      <label>Status</label>
      <select id="attStatus">
        <option value="true">✓ Present</option>
        <option value="false">✗ Absent</option>
      </select>
      <div><button class="btn-primary" onclick="markAttendance('${uid}',this)">Mark Attendance</button></div>
    </div>
    <div class="att-history" style="margin-top:20px;padding-top:16px;border-top:1px solid #f0f0ea">
      <p style="font-size:12px;font-weight:700;color:#666;margin-bottom:10px">RECENT RECORDS</p>
      ${rows}
    </div>`;
}
async function markAttendance(uid, btn) {
  const date = document.getElementById('attDate').value;
  const lesson = document.getElementById('attLesson').value.trim();
  const present = document.getElementById('attStatus').value === 'true';
  if (!date) return toast('Please select a date');
  btn.disabled = true; btn.innerHTML = '<span class="spin-sm"></span>Saving…';
  try {
    await db.collection('attendance').doc(uid).collection('records').add({
      date: firebase.firestore.Timestamp.fromDate(new Date(date)),
      lesson: lesson || 'Class', present,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    toast(`✓ Attendance marked — ${present?'Present':'Absent'}`);
    const snap = await db.collection('attendance').doc(uid).collection('records').orderBy('date','desc').limit(20).get();
    renderAttTab(uid, snap.docs.map(d=>({id:d.id,...d.data()})));
  } catch(e) { toast('Error: '+e.message); btn.disabled=false; btn.textContent='Mark Attendance'; }
}

/* ── NOTES TAB ── */
function renderNotesTab(uid, notes) {
  document.getElementById('dtContent').innerHTML = `
    <p style="font-size:12px;color:#666;margin-bottom:10px">Notes are visible to the student in their portal.</p>
    <textarea class="notes-area" id="notesArea" placeholder="Write feedback, progress notes, areas to improve…">${notes||''}</textarea>
    <div style="margin-top:12px">
      <button class="btn-primary" onclick="saveNotes('${uid}',this)">💾 Save Notes</button>
    </div>`;
}
async function saveNotes(uid, btn) {
  const notes = document.getElementById('notesArea').value;
  btn.disabled=true; btn.innerHTML='<span class="spin-sm"></span>Saving…';
  await db.collection('progress').doc(uid).set({ notes, lastUpdated: firebase.firestore.FieldValue.serverTimestamp() }, { merge: true });
  toast('✓ Notes saved');
  btn.disabled=false; btn.textContent='💾 Save Notes';
}

/* ── PAYMENT TAB ── */
function renderPaymentTab(uid, u) {
  document.getElementById('dtContent').innerHTML = `
    <div class="pay-form">
      <label>Monthly Fee (PKR)</label>
      <input type="number" id="payFee" value="${u.monthlyFee||2000}">
      <label>Payment Status</label>
      <select id="payStatus">
        <option value="paid" ${u.paymentStatus==='paid'?'selected':''}>✓ Paid</option>
        <option value="pending" ${u.paymentStatus==='pending'?'selected':''}>⏳ Pending</option>
        <option value="overdue" ${u.paymentStatus==='overdue'?'selected':''}>⚠ Overdue</option>
      </select>
      <div style="display:flex;gap:10px">
        <button class="btn-primary" onclick="savePayment('${uid}',this)">💾 Update Payment</button>
      </div>
    </div>
    <div style="margin-top:16px;padding:14px;background:#fdf6e3;border-radius:12px;border:1px solid #e8d9a0">
      <p style="font-size:12px;color:#b8860b;font-weight:600">💡 After updating, the student sees the new status in their portal immediately.</p>
    </div>`;
}
async function savePayment(uid, btn) {
  const fee = parseInt(document.getElementById('payFee').value)||2000;
  const status = document.getElementById('payStatus').value;
  btn.disabled=true; btn.innerHTML='<span class="spin-sm"></span>Saving…';
  await db.collection('users').doc(uid).update({ monthlyFee: fee, paymentStatus: status });
  const s = allStudents.find(x=>x.uid===uid);
  if (s) { s.monthlyFee=fee; s.paymentStatus=status; }
  renderStudentList(allStudents);
  toast(`✓ Payment updated — ${status}`);
  btn.disabled=false; btn.textContent='💾 Update Payment';
}

/* ── ANNOUNCEMENTS ── */
async function postAnn(btn) {
  const title = document.getElementById('annTitle').value.trim();
  const body = document.getElementById('annBody').value.trim();
  if (!title||!body) return toast('Please fill in both fields');
  btn.disabled=true; btn.innerHTML='<span class="spin-sm"></span>Posting…';
  await db.collection('announcements').add({
    title, body, teacherName,
    date: firebase.firestore.FieldValue.serverTimestamp()
  });
  document.getElementById('annTitle').value='';
  document.getElementById('annBody').value='';
  toast('✓ Announcement posted — students can see it now');
  loadAnnouncements();
  btn.disabled=false; btn.textContent='Post Announcement';
}
async function deleteAnn(id) {
  if (!confirm('Delete this announcement?')) return;
  await db.collection('announcements').doc(id).delete();
  toast('Announcement deleted');
  loadAnnouncements();
}
async function loadAnnouncements() {
  const snap = await db.collection('announcements').orderBy('date','desc').limit(10).get();
  document.getElementById('stAnn').textContent = snap.size;
  const el = document.getElementById('annList');
  if (!snap.size) { el.innerHTML='<p style="text-align:center;color:#999;padding:16px;font-size:13px">No announcements yet</p>'; return; }
  el.innerHTML = snap.docs.map(d => {
    const a = d.data();
    return `<div class="ann-item">
      <div class="ann-title-t">${a.title}</div>
      <div class="ann-body-t">${a.body}</div>
      <div class="ann-meta"><span>${fmtDate(a.date)} · ${a.teacherName||'Dr. Naeem'}</span><span class="ann-del" onclick="deleteAnn('${d.id}')">Delete</span></div>
    </div>`;
  }).join('');
}

/* ── INIT ── */
auth.onAuthStateChanged(async user => {
  if (!user) { window.location.href='login.html'; return; }
  const userDoc = await db.collection('users').doc(user.uid).get();
  if (!userDoc.exists || userDoc.data().role !== 'teacher') { window.location.href='student-dashboard.html'; return; }

  teacherName = userDoc.data().name || 'Dr. Muhammad Naeem';
  document.getElementById('navName').textContent = teacherName;
  document.getElementById('stToday').textContent = new Date().toLocaleDateString('en-PK',{day:'numeric',month:'short'});

  // Load all students
  const snap = await db.collection('users').where('role','==','student').get();
  allStudents = snap.docs.map(d => ({ uid: d.id, ...d.data() }));
  document.getElementById('stTotal').textContent = allStudents.length;

  // Load progress for avg hifz
  if (allStudents.length) {
    const progSnaps = await Promise.all(allStudents.map(s => db.collection('progress').doc(s.uid).get()));
    let total = 0;
    progSnaps.forEach((d,i) => {
      const surahs = d.exists ? (d.data().surahs||[]) : [];
      allStudents[i].surahs = surahs;
      total += surahs.length;
    });
    document.getElementById('stAvgHifz').textContent = Math.round(total/allStudents.length);
  }

  renderStudentList(allStudents);
  await loadAnnouncements();

  document.getElementById('loadingScreen').style.display='none';
  document.getElementById('appShell').style.display='block';
});

function logout() { auth.signOut().then(() => window.location.href='login.html'); }
</script>
</body>
</html>
