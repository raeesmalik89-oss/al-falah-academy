<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teacher Dashboard · Al-Falah Islamic Academy</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--g:#1a4030;--gm:#1a6b3a;--gold:#c9a84c;--bg:#f5f7f4;--card:#fff;--text:#1a1a1a;--muted:#666}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.nav{background:linear-gradient(135deg,#0d2818,#1a4030);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:60px;position:sticky;top:0;z-index:100}
.nav-logo{display:flex;align-items:center;gap:10px}
.nav-logo span{font-size:22px}
.nav-title{font-size:15px;font-weight:700;color:#fff;white-space:nowrap}
.nav-title small{display:block;font-size:11px;font-weight:400;color:rgba(255,255,255,.6)}
.nav-right{display:flex;align-items:center;gap:12px}
.nav-name{font-size:13px;font-weight:600;color:rgba(255,255,255,.85)}
.nav-logout{font-size:12px;font-weight:600;background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.2);padding:6px 14px;border-radius:8px;cursor:pointer;font-family:inherit}
.nav-logout:hover{background:rgba(255,255,255,.22)}
.main{max-width:1200px;margin:0 auto;padding:28px 20px}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:28px}
.stat{background:var(--card);border-radius:16px;padding:20px 24px;border:1px solid #e8e8e0;display:flex;align-items:center;gap:16px}
.stat-icon{font-size:32px}
.stat-val{font-size:24px;font-weight:800;color:var(--g)}
.stat-label{font-size:12px;color:var(--muted);margin-top:1px}
.two-col{display:grid;grid-template-columns:300px 1fr;gap:20px;margin-bottom:24px}
@media(max-width:900px){.two-col{grid-template-columns:1fr}}
.card{background:var(--card);border-radius:18px;padding:24px;border:1px solid #e8e8e0}
.card-title{font-size:14px;font-weight:700;color:var(--g);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.card-title span{font-size:18px}
.search{width:100%;padding:10px 14px;border:1.5px solid #e0e0e0;border-radius:10px;font-size:13px;font-family:inherit;outline:none;background:#fafaf8;margin-bottom:12px}
.search:focus{border-color:#1a6b3a}
.s-item{padding:12px;border-radius:12px;cursor:pointer;transition:background .15s;margin-bottom:4px;display:flex;align-items:center;gap:12px}
.s-item:hover{background:#f5f7f4}
.s-item.active{background:#f0f7f2;border:1.5px solid #1a6b3a}
.s-av{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#1a4030,#1a6b3a);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:15px;flex-shrink:0}
.s-name{font-size:13px;font-weight:600}
.s-meta{font-size:11px;color:var(--muted)}
.badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;margin-left:6px}
.bg{background:#f0f9f4;color:#15803d;border:1px solid #bbf7d0}
.br{background:#fef2f2;color:#dc2626;border:1px solid #fecaca}
.by{background:#fffbeb;color:#d97706;border:1px solid #fde68a}
.no-s{text-align:center;padding:30px;color:var(--muted);font-size:13px}
.d-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:300px;color:var(--muted);gap:12px}
.d-empty span{font-size:48px}
.d-hdr{display:flex;align-items:center;gap:16px;margin-bottom:20px;padding-bottom:20px;border-bottom:1px solid #f0f0ea}
.d-av{width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#1a4030,#1a6b3a);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:20px;flex-shrink:0}
.d-name{font-size:18px;font-weight:800;color:var(--g)}
.d-email{font-size:13px;color:var(--muted)}
.dtabs{display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap}
.dtab{padding:8px 16px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;border:1.5px solid #e0e0e0;background:#fafaf8;color:#666;font-family:inherit;transition:all .2s}
.dtab.active{background:var(--g);color:#fff;border-color:var(--g)}
.hg{display:grid;grid-template-columns:repeat(auto-fill,minmax(38px,1fr));gap:4px;margin-top:12px}
.hc{aspect-ratio:1;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;cursor:pointer;background:#f0f0ea;color:#999;border:1px solid #e0e0d8;user-select:none;transition:all .15s}
.hc.done{background:linear-gradient(135deg,#1a6b3a,#2d9e55);color:#fff;border-color:#1a6b3a}
.hc:hover{transform:scale(1.15)}
.form-row{display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
.form-row label{font-size:12px;font-weight:600;color:#444}
.form-row input,.form-row select,.form-row textarea{padding:10px 14px;border:1.5px solid #e0e0e0;border-radius:10px;font-size:13px;font-family:inherit;outline:none;background:#fafaf8}
.form-row input:focus,.form-row select:focus,.form-row textarea:focus{border-color:#1a6b3a}
.form-row textarea{resize:vertical;min-height:90px}
.btn-p{padding:10px 20px;background:linear-gradient(135deg,#1a4030,#1a6b3a);color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:opacity .2s}
.btn-p:hover{opacity:.9}.btn-p:disabled{opacity:.6;cursor:not-allowed}
.btn-o{padding:10px 20px;background:#fff;color:var(--g);border:1.5px solid var(--g);border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s}
.btn-o:hover{background:var(--g);color:#fff}
.btn-sm{padding:7px 14px;font-size:12px}
.att-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f5f5f0;font-size:13px}
.att-row:last-child{border-bottom:none}
.att-p{color:#15803d;font-weight:600}.att-a{color:#dc2626;font-weight:600}
.ann-form{display:flex;flex-direction:column;gap:12px;margin-bottom:20px}
.ann-form input,.ann-form textarea{padding:10px 14px;border:1.5px solid #e0e0e0;border-radius:10px;font-size:13px;font-family:inherit;outline:none;background:#fafaf8;resize:vertical}
.ann-form input:focus,.ann-form textarea:focus{border-color:#1a6b3a}
.ann-item{padding:14px;background:#fafaf8;border-radius:12px;margin-bottom:10px;border:1px solid #e8e8e0}
.ann-t{font-size:14px;font-weight:700;margin-bottom:4px}
.ann-b{font-size:13px;color:var(--muted);line-height:1.5}
.ann-m{font-size:11px;color:#bbb;margin-top:6px;display:flex;justify-content:space-between}
.ann-del{color:#dc2626;cursor:pointer;font-weight:600}
.toast{position:fixed;bottom:28px;right:28px;background:#1a4030;color:#fff;padding:12px 20px;border-radius:12px;font-size:13px;font-weight:600;box-shadow:0 8px 24px rgba(0,0,0,.2);z-index:999;opacity:0;transform:translateY(10px);transition:all .3s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
.loading-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:16px;background:var(--bg)}
.spin{width:40px;height:40px;border:3px solid #e0e0e0;border-top-color:#1a6b3a;border-radius:50%;animation:sp .8s linear infinite}
.spin-sm{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="loading-screen" id="ls"><div class="spin"></div><p style="color:#666;font-size:14px">Loading dashboard…</p></div>
<div id="app" style="display:none">
<nav class="nav">
  <div class="nav-logo"><span>🕌</span><div class="nav-title">Al-Falah Academy<small>Teacher Dashboard</small></div></div>
  <div class="nav-right"><span class="nav-name" id="navName"></span><button class="nav-logout" onclick="logout()">Logout</button></div>
</nav>
<div class="main">
  <div class="stats">
    <div class="stat"><div class="stat-icon">👥</div><div><div class="stat-val" id="stTotal">0</div><div class="stat-label">Total Students</div></div></div>
    <div class="stat"><div class="stat-icon">📅</div><div><div class="stat-val" id="stDate">—</div><div class="stat-label">Today</div></div></div>
    <div class="stat"><div class="stat-icon">📢</div><div><div class="stat-val" id="stAnn">0</div><div class="stat-label">Announcements</div></div></div>
    <div class="stat"><div class="stat-icon">📖</div><div><div class="stat-val" id="stHifz">0</div><div class="stat-label">Avg Surahs / Student</div></div></div>
  </div>
  <div class="two-col">
    <div class="card">
      <div class="card-title"><span>👥</span> Students</div>
      <input class="search" type="text" placeholder="Search student…" oninput="filterS(this.value)">
      <div id="sList"><div class="no-s">No students yet</div></div>
    </div>
    <div class="card" id="dPanel">
      <div class="d-empty"><span>👈</span><p>Select a student to manage</p></div>
    </div>
  </div>
  <div class="card">
    <div class="card-title"><span>📢</span> Announcements — Visible to All Students</div>
    <div class="ann-form">
      <input type="text" id="annT" placeholder="Announcement title (e.g. Eid Holiday)">
      <textarea id="annB" rows="3" placeholder="Write your announcement…"></textarea>
      <div><button class="btn-p" onclick="postAnn(this)">Post Announcement</button></div>
    </div>
    <div id="annList"></div>
  </div>
</div>
</div>
<div class="toast" id="toast"></div>

<script src="supabase-config.js"></script>
<script>
const SURAHS=['Al-Fatihah','Al-Baqarah','Aal-Imran','An-Nisa','Al-Maidah','Al-Anam','Al-Araf','Al-Anfal','At-Tawbah','Yunus','Hud','Yusuf','Ar-Ra\'d','Ibrahim','Al-Hijr','An-Nahl','Al-Isra','Al-Kahf','Maryam','Ta-Ha','Al-Anbiya','Al-Hajj','Al-Muminun','An-Nur','Al-Furqan','Ash-Shu\'ara','An-Naml','Al-Qasas','Al-Ankabut','Ar-Rum','Luqman','As-Sajdah','Al-Ahzab','Saba','Fatir','Ya-Sin','As-Saffat','Sad','Az-Zumar','Ghafir','Fussilat','Ash-Shura','Az-Zukhruf','Ad-Dukhan','Al-Jathiyah','Al-Ahqaf','Muhammad','Al-Fath','Al-Hujurat','Qaf','Adh-Dhariyat','At-Tur','An-Najm','Al-Qamar','Ar-Rahman','Al-Waqi\'ah','Al-Hadid','Al-Mujadila','Al-Hashr','Al-Mumtahanah','As-Saf','Al-Jumu\'ah','Al-Munafiqun','At-Taghabun','At-Talaq','At-Tahrim','Al-Mulk','Al-Qalam','Al-Haqqah','Al-Ma\'arij','Nuh','Al-Jinn','Al-Muzzammil','Al-Muddaththir','Al-Qiyamah','Al-Insan','Al-Mursalat','An-Naba','An-Nazi\'at','Abasa','At-Takwir','Al-Infitar','Al-Mutaffifin','Al-Inshiqaq','Al-Buruj','At-Tariq','Al-Ala','Al-Ghashiyah','Al-Fajr','Al-Balad','Ash-Shams','Al-Layl','Ad-Duha','Ash-Sharh','At-Tin','Al-Alaq','Al-Qadr','Al-Bayyinah','Az-Zalzalah','Al-Adiyat','Al-Qari\'ah','At-Takathur','Al-Asr','Al-Humazah','Al-Fil','Quraysh','Al-Ma\'un','Al-Kawthar','Al-Kafirun','An-Nasr','Al-Masad','Al-Ikhlas','Al-Falaq','An-Nas'];

let students=[], selUid=null, tName='Dr. Muhammad Naeem';
const fmtDate=d=>d?new Date(d).toLocaleDateString('en-PK',{day:'numeric',month:'short',year:'numeric'}):'—';
const toast=msg=>{const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);};
const ini=s=>s.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();

function renderStudents(list){
  const el=document.getElementById('sList');
  if(!list.length){el.innerHTML='<div class="no-s">No students enrolled yet</div>';return;}
  el.innerHTML=list.map(s=>{
    const ps=s.payment_status||'pending';
    return `<div class="s-item ${selUid===s.id?'active':''}" onclick="selStudent('${s.id}')">
      <div class="s-av">${ini(s)}</div>
      <div><div class="s-name">${s.name}<span class="badge ${ps==='paid'?'bg':ps==='overdue'?'br':'by'}">${ps==='paid'?'Paid':ps==='overdue'?'Overdue':'Due'}</span></div>
      <div class="s-meta">${s.course||'Quran Hifz'}</div></div>
    </div>`;
  }).join('');
}
function filterS(q){renderStudents(q?students.filter(s=>s.name.toLowerCase().includes(q.toLowerCase())):students);}

async function selStudent(uid){
  selUid=uid; renderStudents(students);
  document.getElementById('dPanel').innerHTML='<div style="display:flex;align-items:center;justify-content:center;min-height:200px"><div class="spin"></div></div>';
  const [{data:u},{data:prog},{data:att}]=await Promise.all([
    _sb.from('profiles').select('*').eq('id',uid).single(),
    _sb.from('progress').select('*').eq('id',uid).single(),
    _sb.from('attendance').select('*').eq('student_id',uid).order('date',{ascending:false}).limit(15)
  ]);
  document.getElementById('dPanel').innerHTML=`
    <div class="d-hdr">
      <div class="d-av">${ini(u)}</div>
      <div><div class="d-name">${u.name}</div><div class="d-email">${u.email}</div><div style="font-size:12px;color:var(--g);font-weight:600;margin-top:4px">${u.course||'Quran Hifz'}</div></div>
    </div>
    <div class="dtabs">
      <button class="dtab active" onclick="tab('hifz',this)">📗 Hifz</button>
      <button class="dtab" onclick="tab('att',this)">📋 Attendance</button>
      <button class="dtab" onclick="tab('notes',this)">📝 Notes</button>
      <button class="dtab" onclick="tab('pay',this)">💳 Payment</button>
    </div>
    <div id="dContent"></div>`;
  renderHifz(uid, prog);
}

function tab(t,btn){
  document.querySelectorAll('.dtab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');
  if(t==='hifz') _sb.from('progress').select('*').eq('id',selUid).single().then(({data})=>renderHifz(selUid,data));
  else if(t==='att') _sb.from('attendance').select('*').eq('student_id',selUid).order('date',{ascending:false}).limit(20).then(({data})=>renderAtt(selUid,data||[]));
  else if(t==='notes') _sb.from('progress').select('notes').eq('id',selUid).single().then(({data})=>renderNotes(selUid,data?.notes||''));
  else if(t==='pay') _sb.from('profiles').select('*').eq('id',selUid).single().then(({data})=>renderPay(selUid,data));
}

function renderHifz(uid,prog){
  const mem=new Set(prog?.surahs||[]);
  document.getElementById('dContent').innerHTML=`
    <p style="font-size:13px;color:#666;margin-bottom:8px">Click surah to mark/unmark. <strong style="color:#1a4030">${mem.size}/114 memorized</strong></p>
    <div class="hg">${SURAHS.map((_,i)=>`<div class="hc ${mem.has(i+1)?'done':''}" id="hc${i+1}" title="${i+1}. ${SURAHS[i]}" onclick="this.classList.toggle('done')">${i+1}</div>`).join('')}</div>
    <div style="display:flex;gap:10px;margin-top:16px;flex-wrap:wrap">
      <button class="btn-p btn-sm" onclick="saveHifz('${uid}',this)">💾 Save Progress</button>
      <button class="btn-o btn-sm" onclick="SURAHS.forEach((_,i)=>document.getElementById('hc'+(i+1))?.classList.add('done'))">✓ All</button>
      <button class="btn-o btn-sm" onclick="SURAHS.forEach((_,i)=>document.getElementById('hc'+(i+1))?.classList.remove('done'))">✕ Clear</button>
    </div>`;
}
async function saveHifz(uid,btn){
  const mem=SURAHS.map((_,i)=>document.getElementById('hc'+(i+1))?.classList.contains('done')?i+1:null).filter(Boolean);
  btn.disabled=true;btn.innerHTML='<span class="spin-sm"></span>Saving…';
  await _sb.from('progress').upsert({id:uid,surahs:mem,last_updated:new Date().toISOString()});
  const s=students.find(x=>x.id===uid);if(s)s.surahs=mem;
  updateAvgHifz();
  toast(`✓ Saved — ${mem.length} surahs memorized`);
  btn.disabled=false;btn.textContent='💾 Save Progress';
}

function renderAtt(uid,records){
  const rows=records.length?records.map(r=>`<div class="att-row"><span style="color:#666">${fmtDate(r.date)}</span><span style="font-size:12px;color:#555">${r.lesson||'Class'}</span><span class="${r.present?'att-p':'att-a'}">${r.present?'✓ Present':'✗ Absent'}</span></div>`).join(''):'<p style="text-align:center;color:#999;padding:16px;font-size:13px">No records yet</p>';
  document.getElementById('dContent').innerHTML=`
    <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:16px">
      <div class="form-row"><label>Date</label><input type="date" id="aDate" value="${new Date().toISOString().split('T')[0]}"></div>
      <div class="form-row"><label>Lesson / Topic</label><input type="text" id="aLesson" placeholder="e.g. Surah Al-Baqarah revision"></div>
      <div class="form-row"><label>Status</label><select id="aStat"><option value="true">✓ Present</option><option value="false">✗ Absent</option></select></div>
      <div><button class="btn-p" onclick="markAtt('${uid}',this)">Mark Attendance</button></div>
    </div>
    <div style="padding-top:16px;border-top:1px solid #f0f0ea">
      <p style="font-size:12px;font-weight:700;color:#666;margin-bottom:10px">RECENT RECORDS</p>${rows}</div>`;
}
async function markAtt(uid,btn){
  const date=document.getElementById('aDate').value;
  const lesson=document.getElementById('aLesson').value.trim();
  const present=document.getElementById('aStat').value==='true';
  if(!date)return toast('Select a date');
  btn.disabled=true;btn.innerHTML='<span class="spin-sm"></span>Saving…';
  await _sb.from('attendance').insert({student_id:uid,date,lesson:lesson||'Class',present});
  toast(`✓ Attendance marked — ${present?'Present':'Absent'}`);
  const {data}=await _sb.from('attendance').select('*').eq('student_id',uid).order('date',{ascending:false}).limit(15);
  renderAtt(uid,data||[]);
}

function renderNotes(uid,notes){
  document.getElementById('dContent').innerHTML=`
    <p style="font-size:12px;color:#666;margin-bottom:10px">Notes are visible to the student in their portal.</p>
    <div class="form-row"><textarea id="nArea">${notes}</textarea></div>
    <button class="btn-p" onclick="saveNotes('${uid}',this)">💾 Save Notes</button>`;
}
async function saveNotes(uid,btn){
  btn.disabled=true;btn.innerHTML='<span class="spin-sm"></span>Saving…';
  await _sb.from('progress').upsert({id:uid,notes:document.getElementById('nArea').value,last_updated:new Date().toISOString()});
  toast('✓ Notes saved');btn.disabled=false;btn.textContent='💾 Save Notes';
}

function renderPay(uid,u){
  document.getElementById('dContent').innerHTML=`
    <div style="display:flex;flex-direction:column;gap:10px">
      <div class="form-row"><label>Monthly Fee (PKR)</label><input type="number" id="pFee" value="${u?.monthly_fee||2000}"></div>
      <div class="form-row"><label>Payment Status</label>
        <select id="pStat">
          <option value="paid" ${u?.payment_status==='paid'?'selected':''}>✓ Paid</option>
          <option value="pending" ${u?.payment_status==='pending'?'selected':''}>⏳ Pending</option>
          <option value="overdue" ${u?.payment_status==='overdue'?'selected':''}>⚠ Overdue</option>
        </select>
      </div>
      <button class="btn-p" onclick="savePay('${uid}',this)">💾 Update Payment</button>
    </div>
    <div style="margin-top:16px;padding:14px;background:#fdf6e3;border-radius:12px;border:1px solid #e8d9a0">
      <p style="font-size:12px;color:#b8860b;font-weight:600">💡 Student sees updated status immediately in their portal.</p>
    </div>`;
}
async function savePay(uid,btn){
  const fee=parseInt(document.getElementById('pFee').value)||2000;
  const status=document.getElementById('pStat').value;
  btn.disabled=true;btn.innerHTML='<span class="spin-sm"></span>Saving…';
  await _sb.from('profiles').update({monthly_fee:fee,payment_status:status}).eq('id',uid);
  const s=students.find(x=>x.id===uid);if(s){s.monthly_fee=fee;s.payment_status=status;}
  renderStudents(students);toast(`✓ Payment updated — ${status}`);
  btn.disabled=false;btn.textContent='💾 Update Payment';
}

async function postAnn(btn){
  const title=document.getElementById('annT').value.trim();
  const body=document.getElementById('annB').value.trim();
  if(!title||!body)return toast('Fill in both fields');
  btn.disabled=true;btn.innerHTML='<span class="spin-sm"></span>Posting…';
  await _sb.from('announcements').insert({title,body,teacher_name:tName});
  document.getElementById('annT').value='';document.getElementById('annB').value='';
  toast('✓ Announcement posted');loadAnns();
  btn.disabled=false;btn.textContent='Post Announcement';
}
async function delAnn(id){
  if(!confirm('Delete this announcement?'))return;
  await _sb.from('announcements').delete().eq('id',id);
  toast('Deleted');loadAnns();
}
async function loadAnns(){
  const {data,count}=await _sb.from('announcements').select('*',{count:'exact'}).order('created_at',{ascending:false}).limit(10);
  document.getElementById('stAnn').textContent=count||0;
  const el=document.getElementById('annList');
  if(!data?.length){el.innerHTML='<p style="text-align:center;color:#999;padding:16px;font-size:13px">No announcements yet</p>';return;}
  el.innerHTML=data.map(a=>`<div class="ann-item"><div class="ann-t">${a.title}</div><div class="ann-b">${a.body}</div><div class="ann-m"><span>${fmtDate(a.created_at)} · ${a.teacher_name}</span><span class="ann-del" onclick="delAnn('${a.id}')">Delete</span></div></div>`).join('');
}
function updateAvgHifz(){
  const total=students.reduce((a,s)=>a+(s.surahs?.length||0),0);
  document.getElementById('stHifz').textContent=students.length?Math.round(total/students.length):0;
}

(async()=>{
  const {data:{session}}=await _sb.auth.getSession();
  if(!session){window.location.href='login.html';return;}
  const uid=session.user.id;
  const {data:me}=await _sb.from('profiles').select('*').eq('id',uid).single();
  if(!me||me.role!=='teacher'){window.location.href='student-dashboard.html';return;}
  tName=me.name||'Dr. Muhammad Naeem';
  document.getElementById('navName').textContent=tName;
  document.getElementById('stDate').textContent=new Date().toLocaleDateString('en-PK',{day:'numeric',month:'short'});

  const {data:studs}=await _sb.from('profiles').select('*').eq('role','student');
  students=studs||[];
  document.getElementById('stTotal').textContent=students.length;

  // Load progress for avg hifz
  if(students.length){
    const progs=await Promise.all(students.map(s=>_sb.from('progress').select('surahs').eq('id',s.id).single()));
    progs.forEach(({data},i)=>{students[i].surahs=data?.surahs||[];});
    updateAvgHifz();
  }
  renderStudents(students);
  await loadAnns();
  document.getElementById('ls').style.display='none';
  document.getElementById('app').style.display='block';
})();

async function logout(){await _sb.auth.signOut();window.location.href='login.html';}
</script>
</body>
</html>
